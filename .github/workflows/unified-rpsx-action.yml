name: Unified Build & Test

on:
  push:
    branches: [productive, develop]
  merge_group:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [productive, develop]

jobs:
  yaml-linter:
    name: YAML Linter
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - name: Setup submodule
        run: git submodule update --init --recursive
      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5
      - name: Update Engine Submodules
        run: |
          cd RobustToolbox/
          git submodule update --init --recursive
      - name: Setup secrets
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          git -c submodule.RPSX.update=checkout -c submodule.RPSX.url="https://${{ env.ACCESS_TOKEN }}@github.com/rp-s-tech/SS14_Workstation_Private.git" submodule update --init
          ./RPSX/sync.sh -y
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 9.0.x
      - name: Install dependencies
        run: dotnet restore RPSX.sln
      - name: Build
        run: dotnet build RPSX.sln --configuration Release --no-restore /p:WarningsAsErrors= /m
      - name: Run Linter
        run: dotnet run --project Content.YAMLLinter/Content.YAMLLinter.csproj --no-build

  build-test-debug:
    name: Build & Test Debug
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout Master
        uses: actions/checkout@v4.2.2
      - name: Setup Submodule
        run: git submodule update --init --recursive
      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5
      - name: Update Engine Submodules
        run: |
          cd RobustToolbox/
          git submodule update --init --recursive
      - name: Setup secrets
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          git -c submodule.RPSX.update=checkout -c submodule.RPSX.url="https://${{ env.ACCESS_TOKEN }}@github.com/rp-s-tech/SS14_Workstation_Private.git" submodule update --init
          ./RPSX/sync.sh -y
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 9.0.x
      - name: Install dependencies
        run: dotnet restore RPSX.sln
      - name: Build Project
        run: dotnet build RPSX.sln --configuration DebugOpt --no-restore /m
      - name: Run Content.Tests
        run: dotnet test --no-build --configuration DebugOpt Content.Tests/Content.Tests.csproj -- NUnit.ConsoleOut=0
      - name: Run Content.IntegrationTests
        shell: pwsh
        run: |
          $env:DOTNET_gcServer=1
          dotnet test --no-build --configuration DebugOpt Content.IntegrationTests/Content.IntegrationTests.csproj -- NUnit.ConsoleOut=0 NUnit.MapWarningTo=Failed

  build-test-maprenderer:
    name: Build & Test Map Renderer
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout Master
        uses: actions/checkout@v4.2.2
      - name: Setup Submodule
        run: git submodule update --init --recursive
      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5
      - name: Update Engine Submodules
        run: |
          cd RobustToolbox/
          git submodule update --init --recursive
      - name: Setup secrets
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          git -c submodule.RPSX.update=checkout -c submodule.RPSX.url="https://${{ env.ACCESS_TOKEN }}@github.com/rp-s-tech/SS14_Workstation_Private.git" submodule update --init
          ./RPSX/sync.sh -y
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 9.0.x
      - name: Install dependencies
        run: dotnet restore RPSX.sln
      - name: Build Project
        run: dotnet build Content.MapRenderer --configuration Release --no-restore /m
      - name: Run Map Renderer
        run: dotnet run --project Content.MapRenderer Dev

  test-packaging:
    name: Test Packaging
    if: github.actor != 'PJBot' && github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Master
        uses: actions/checkout@v4.2.2
      - name: Setup Submodule
        run: git submodule update --init --recursive
      - name: Pull engine updates
        uses: space-wizards/submodule-dependency@v0.1.5
      - name: Update Engine Submodules
        run: |
          cd RobustToolbox/
          git submodule update --init --recursive
      - name: Setup secrets
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          git -c submodule.RPSX.update=checkout -c submodule.RPSX.url="https://${{ secrets.ACCESS_TOKEN }}@github.com/rp-s-tech/SS14_Workstation_Private.git" submodule update --init
          ./RPSX/sync.sh -y
      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4.1.0
        with:
          dotnet-version: 9.0.x
      - name: Install dependencies
        run: dotnet restore RPSX.sln
      - name: Build Packaging
        run: dotnet build Content.Packaging --configuration Release --no-restore /m
      - name: Package server
        run: dotnet run --project Content.Packaging server --platform win-x64 --platform linux-x64 --platform osx-x64 --platform linux-arm64
      - name: Package client
        run: dotnet run --project Content.Packaging client --no-wipe-release

  report:
    name: Report CI Result
    runs-on: ubuntu-latest
    needs:
      - yaml-linter
      - build-test-debug
      - build-test-maprenderer
      - test-packaging
    if: always()
    steps:
      - name: Checkout Master
        uses: actions/checkout@v4.2.2
      - name: Comment on PR with summary
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_FOR_COMMENTS }}
        run: |
          gh auth login --with-token <<< "$GH_TOKEN"
          PR_NUM=${{ github.event.pull_request.number }}
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      
          STATUS_YAML=${{ needs.yaml-linter.result }}
          STATUS_DEBUG=${{ needs.build-test-debug.result }}
          STATUS_MAP=${{ needs.build-test-maprenderer.result }}
          STATUS_PACK=${{ needs.test-packaging.result }}
      
          comment="## 🔎 CI Summary\n"
      
          comment+="- YAML Linter: $STATUS_YAML"
          if [ "$STATUS_YAML" != "success" ]; then
            comment+=" ([logs]($RUN_URL))"
          fi
          comment+="\n"
      
          comment+="- Build & Test Debug: $STATUS_DEBUG"
          if [ "$STATUS_DEBUG" != "success" ]; then
            comment+=" ([logs]($RUN_URL))"
          fi
          comment+="\n"
      
          comment+="- Map Renderer: $STATUS_MAP"
          if [ "$STATUS_MAP" != "success" ]; then
            comment+=" ([logs]($RUN_URL))"
          fi
          comment+="\n"
      
          comment+="- Packaging: $STATUS_PACK"
          if [ "$STATUS_PACK" != "success" ]; then
            comment+=" ([logs]($RUN_URL))"
          fi
          comment+="\n"
      
          gh pr comment "$PR_NUM" --body "$comment"

