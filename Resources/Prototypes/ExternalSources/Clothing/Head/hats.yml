- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadTinfoil
  name: tinfoil hat
  description: Protects you from all manner of psionic assaults.
  components:
    - type: Sprite
      sprite: Clothing/ExternalSources/Head/Hats/tinfoil.rsi
    - type: Clothing
      sprite: Clothing/ExternalSources/Head/Hats/tinfoil.rsi
    - type: Armor
      modifiers:
        coefficients:
          Radiation: 0.95

- type: entity
  parent: ClothingHeadTinfoil
  id: ClothingHeadCage
