    - type: Sprite
      sprite: Clothing/ExternalSources/Head/Hats/cage.rsi
    - type: Clothing
      sprite: Clothing/ExternalSources/Head/Hats/cage.rsi

- type: entity
  parent: ClothingHeadTinfoil
  id: ClothingHeadHelmetInsulated
  name: insulative skullcap
  description: Psionically insulates whoevers head is inside it. It has some protection from physical damage.
  components:
    - type: Sprite
      sprite: Clothing/ExternalSources/Head/Helmets/insulative_skullcap.rsi
    - type: Clothing
      sprite: Clothing/ExternalSources/Head/Helmets/insulative_skullcap.rsi
    - type: Armor
      modifiers:
        coefficients:
          Blunt: 0.85
          Slash: 0.85
          Piercing: 0.95
          Radiation: 0.95
        securePartTypes:
          Head: 0.75

