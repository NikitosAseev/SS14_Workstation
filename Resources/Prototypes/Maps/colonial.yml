            Botanist: [ 2, 2 ]
            Chef: [ 1, 1 ]
            Janitor: [ 2, 2 ]
            Chaplain: [ 1, 1 ]
            Reporter: [ 1, 1 ]
            ServiceWorker: [ 1, 1 ]
            Administrator: [ 1, 1 ]
            #civilian
            Passenger: [ -1, -1 ]
            Clown: [ 2, 2 ] #:jokerje
            Mime: [ 1, 1 ]
            Musician: [ 1, 1 ]
            #silicon
            StationAi: [ 1, 1 ]
            Borg: [ 4, 4 ]
