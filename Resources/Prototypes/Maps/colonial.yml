- type: gameMap
  id: Colonial
  mapName: 'Colonial'
  mapPath: /Maps/colonial.yml
  maxRandomOffset: 0
  randomRotation: false
  minPlayers: 10
  maxPlayers: 70
  stations:
    colonial:
      stationProto: StandardNanotrasenStation
      components:
        - type: StationNameSetup
          mapNameTemplate: '{0} colonial {1}'
          nameGenerator:
            !type:NanotrasenNameGenerator
            prefixCreator: '_Teta' # teta или же скк-средний космический корабль
        - type: StationEmergencyShuttle
          emergencyShuttlePath: /Maps/Shuttles/emergency_corvaxdelta.yml
