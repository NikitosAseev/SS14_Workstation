- type: entity
  name: Vulp soup
  parent: FoodBowlBase
  id: FoodSoupMeatVulp
  description: With a slight hint of wool.
  components:
  - type: Sprite
    sprite: _RPSX/Objects/Consumable/Food/Bowl/vulpsoup.rsi
    state: vulposoup
  - type: FlavorProfile
    flavors:
      - meaty
      - funny
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 40
        reagents:
        - ReagentId: Nutriment
          Quantity: 8
        - ReagentId: Vitamin
          Quantity: 17
        - ReagentId: Water
          Quantity: 5
  - type: Tag
    tags:
    - Meat
    - Soup

