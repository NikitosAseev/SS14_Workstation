- type: entity
  id: MagazinePistolHighNerf
  name: high magaxine pistol
  parent: BaseMagazinePistolHighCapacity
  components:
  - type: BallisticAmmoProvider
    whitelist:
      tags:
        - MiniBulletNerf
    mayTransfer: true
    proto: MiniBulletNerf
    capacity: 15
  - type: Sprite
    sprite: _RPSX/Objects/Weapons/Guns/Ammunitions/Magazine/Rifle/nerf_green.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-1
        map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 4
  - type: Tag
    tags:
      - MagazinePistolHighNerf


