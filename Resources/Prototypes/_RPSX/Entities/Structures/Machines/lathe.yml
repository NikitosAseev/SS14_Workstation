- type: entity
  id: MedicalPrinter
  parent: BaseLatheLube
  name: Medical Printer
  description: A machine.
  components:
  - type: Sprite
    sprite: _RPSX/MainGame/Structures/Machines/medical-printer.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Lathe
    idleState: icon
    runningState: building
    unlitIdleState: unlit
    unlitRunningState: unlit-building
    staticPacks:
    - PrinterLatheStaticPack
    dynamicPacks:
    - AdvencedPrinterLathePack
  - type: Machine
    board: MedicalPrinterCircuitboard
  - type: StealTarget
    stealGroup: MedicalPrinterCircuitboard
  - type: OreSiloClient
  - type: LatheAnnouncing
    channels: [Medical]