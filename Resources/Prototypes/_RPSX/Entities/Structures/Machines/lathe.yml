- type: entity
  id: MedicalPrinter
  parent: BaseLatheLube
  name: Medical Printer
  description: A machine.
  components:
  - type: Sprite
    sprite: Structures/Machines/techfab.rsi
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: med
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Lathe
    idleState: icon
    runningState: icon
    staticPacks:
    - PrinterLatheStaticPack
  - type: Machine
    board: MedicalPrinterCircuitboard
  - type: OreSiloClient
  - type: LatheAnnouncing
    channels: [Medical]