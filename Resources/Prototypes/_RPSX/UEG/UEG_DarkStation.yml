# Частота и ключ ОПЗ
- type: radioChannel
  id: UEG
  name: ОПЗ
  keycode: 'u'
  frequency: 1414
  color: "#559ca1"
  longRange: true

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyUEGDark
  name: ключ шифрования ОПЗ
  description: Ключ шифрования, используемый силами ОПЗ.
  components:
  - type: EncryptionKey
    channels:
    - UEG
    defaultChannel: UEG
  - type: Sprite
    sprite: DarkStation/MainGame/UEG/EncryptionKeyUEG.rsi
    layers:
    - state: crypt_UEG
    - state: UEG_label

# Гарнитура
- type: entity
