# Постеры
- type: entity
  parent: PosterBase
  id: PosterLegitBannerUEG
  name: ОПЗ
  description: Плакат с изображением основного символа ОПЗ.
  components:
  - type: Sprite
    drawdepth: WallTops
    sprite: DarkStation/MainGame/UEG/Posters.rsi
    state: poster_UEG_3
    snapCardinals: true

- type: entity
  parent: PosterLegitBannerUEG
  id: PosterLegitServeUEG
  name: Служи!
  description: Плакат, призывающий к служению в рядах армии ОПЗ.
  components:
  - type: Sprite
    state: poster_UEG_2

- type: entity
  parent: PosterLegitBannerUEG
  id: PosterLegitRecruitmentUEG
  name: Набор
  description: Вступайте в ряды сил ОПЗ! Станьте частью армии, несущей истину!
  components:
  - type: Sprite
    state: poster_UEG_1

